        - 개발 일정표 채우기 (8-9페이지)

  # ---------------------------------------------------------------------------
  # 🐄 소 발정탐지 (Cattle Estrus Detection)
  # ---------------------------------------------------------------------------
  cattle_estrus:
    name: 소 발정탐지 AI 시스템
    status: active
    description: |
      소 행동 분석으로 발정 감지
      YOLOv8 + DeepSORT + 승가 행동 분석
      웹 UI로 실시간 모니터링
    
    hosts:
      nex:
        path: ~/projects/cattle-estrus-detection
        run: |
          cd ~/projects/cattle-estrus-detection
          source venv/bin/activate
          python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
        web: http://localhost:8000
        cursor_project: ~/.cursor/projects/home-ppak-SynologyDrive2-projects-Cow-cattle-watch
        gemini_brain: ~/.gemini/antigravity/brain/e12004fc-83a0-4882-9a3a-bf71a76caa4a/cattle_watch
        dataset: ~/Dropbox/Company/cow/Cattle.v1i.yolov11
        trained_model: ~/projects/cattle-estrus-detection/runs/train/cattle_v1/weights/best.pt
        purpose: 개발/학습
    
    stack:
      - YOLOv8
      - DeepSORT
      - FastAPI
      - React
      - WebSocket
      - TailwindCSS
    
    related_paths:
      - ~/SynologyDrive2/projects/Cow/cattle-watch

  # ---------------------------------------------------------------------------
  # 🤖 Clawdbot
  # ---------------------------------------------------------------------------
  clawd:
    name: Clawdbot 워크스페이스
    status: active
    description: AI 어시스턴트 워크스페이스 (메모리, 설정, 프로젝트 관리)
    
    hosts:
      nex:
        path: ~/clawd
        memory: ~/clawd/memory/
        config: ~/.clawdbot/
    
    files:
      - AGENTS.md
      - SOUL.md
      - PROJECTS.yaml  # 이 파일
      - memory/*.md

