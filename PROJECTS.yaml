# 세션 시작 시 참조하여 프로젝트 컨텍스트 빠르게 파악
# 마지막 업데이트: 2026-02-06
# =============================================================================

projects:

  # ---------------------------------------------------------------------------
  # 🛗 승강기 (정일산업)
  # ---------------------------------------------------------------------------
  elevator:
    name: 승강기 쓰러짐/싸움 감지 시스템
    client: 정일산업
    status: active
    description: |
      승강기 내 CCTV 영상으로 쓰러짐/싸움 감지
      MediaPipe + YOLOv11-Pose 기반 실시간 추론
    
    hosts:
      xavier:
        ip: 192.168.0.29
        ssh: "ssh -i ~/.ssh/id_ed25519 ppak@192.168.0.29"
        path: ~/projects/elevator
        venv: ~/projects/elevator/venv
        services:
          deepstream: "elevator-ds-{webcam,rtsp,video1,video2}.service"
          preview: "elevator-preview-{webcam,rtsp,video1,video2}.service (5000~5003)"
          dashboard: "elevator-dashboard.service (:7000)"
        dashboard: http://192.168.0.29:7000
        preview_urls:
          webcam: http://192.168.0.29:5000
          rtsp: http://192.168.0.29:5001
          video1: http://192.168.0.29:5002
          video2: http://192.168.0.29:5003
        purpose: 엣지 추론 (Jetson AGX Orin, 4채널 DeepStream + 통합 대시보드)
      
      nex:
        path: ~/pipe_projects/wareco_pipe/gpu-server/pipe_dataset/elve_exported_yolo
        models: ~/pipe_projects/wareco_pipe/gpu-server/pipe_dataset/elve_exported_yolo/runs/train
        videos: ~/Videos/jungil/승강기*.mp4
        purpose: 학습/데이터 관리
    
    stack:
      - YOLOv11-Pose
      - YOLOv11L-seg
      - MediaPipe
      - Flask
      - TensorRT
      - JetPack R35.6
    
    docs:
      - ~/SynologyDrive/ykpark/정일/
      - ~/Documents/정일/

  # ---------------------------------------------------------------------------
  # 🔧 관로 점검 (K-water / 수자원기술)
  # ---------------------------------------------------------------------------
  pipe_inspect:
    name: 영상판독 기반 관상태 평가 기술 개발 (iPipeCheck)
    client: K-water (발주), 인튜웍스 (대표사/AI개발), 공동수급체1 (학술), 공동수급체2 (실증)
    status: active
    contract_period: "2025.08 ~ 2027.12 (3년)"
    description: |
      K-water 학술용역 — 상수관로 내시진단 영상 AI 자동 판독 시스템
      6대 핵심 과업:
        1. 오토라벨링 솔루션 (속도 33fps, 정확도 95%+)
        2. AI 결함 탐지 — Instance Segmentation (mAP 85%+, P/R 80%+, IoU 70%+)
        3. 결함 크기/면적 산출 — 소실점 + Depth Estimation (오차 25% 이내)
        4. 관내부 평면 도식화 — 곡면→평면 전개도 (오차 20% 이내)
        5. 관상태 평가 알고리즘 — 등급 자동 판정 (기술자 대비 85%+ 정합성)
        6. 진단 레포트 자동 생성 — PDF (진단시간 80% 단축)
    
    yearly_goals:
      year1: 데이터 수집/전처리/가공 + AI 모델 개발 + 법령조사 + 테스트환경 구축
      year2: 평면 도식화 + 크기/면적 산출 알고리즘 + 오토라벨링 UI + 실증 시범적용
      year3: 종합 평가 알고리즘 + 레포트 자동화 + UI 완성 + 최종 실증 + 논문/특허
    
    kpi:
      detection_map: "85%+"
      detection_precision_recall: "80%+"
      detection_iou: "70%+"
      size_error_rate: "≤25%"
      flattening_error: "≤20%"
      expert_consistency: "85%+"
      realtime_fps: "20+"
      diagnosis_time_reduction: "80%+"
    
    proposal_doc: "/home/ppak/nas2/Synol_Share/kwater/최종_정성적평가 제안서.pdf"
    proposal_text: "~/clawd/kwater-proposal.txt"
    
    hosts:
      samtel:
        ip: 192.168.0.32
        user: intu
        ssh: intu@192.168.0.32
        apps:
          production:
            path: ~/projects/pipe-inspector-electron
            port: 5003
            web: http://192.168.0.32:5003
            purpose: 운영 서버
          staging:
            path: ~/projects/pipe-inspector-staging
            port: 5005
            gpu_port: 5006
            web: http://192.168.0.32:5005
            purpose: 스테이징 (테스트/개발)
        gpu_server: ~/projects/pipe-inspector-electron/gpu-server
      
      nex:
        apps:
          wareco_pipe:
            path: ~/pipe_projects/wareco_pipe
            run: ./start.sh
            web: http://localhost:5001
            purpose: 메인 라벨링/추론 플랫폼
          
          local_pipe_inspect:
            path: ~/local_pipe_inspect
            run: npm run dev
            purpose: K-water 데모 웹앱
          
          pipe_inspector_electron:
            path: ~/pipe-inspector-electron
            run: npm start
            purpose: 데스크톱 앱 (Electron)
        
        datasets: ~/pipe_projects/wareco_pipe/gpu-server/pipe_dataset/
        models: ~/pipe_projects/wareco_pipe/gpu-server/*.pt
    
    stack:
      - YOLOv11-seg
      - Grounded-SAM
      - Flask
      - Electron
      - React
      - Python
    
    classes:
      - scale (스케일/결절)
      - slime (슬라임)
      - crack (크랙/균열)
      - deformation (변형)
      - coating_peel (도장재 박리)
      - corrosion (부식)
      - sediment (침전물/퇴적물)
      - intrusion (침입수)
      - normal (정상)
    
    annotation_stats:
      total: 721
      primary_annotator: jsKim (708건)
      projects: 8
      last_checked: "2026-03-03"

