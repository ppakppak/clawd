      딥바이 전략 (삼성전자, 현대차, 두산에너빌리티)
    
    hosts:
      mac:
        ip: 192.168.0.18
        ssh: ppak@192.168.0.18
        path: ~/개발/stock
        run: |
          cd ~/개발/stock
          source venv/bin/activate
          python backend/main.py
        purpose: 실운영 (딥바이 v3.1)
      
      nex:
        path: ~/stock
        purpose: 개발/테스트 (구버전)
        config: ~/KIS/config/
    
    stack:
      - Python
      - FastAPI
      - KIS API
      - React (Frontend)
    
    schedule:
